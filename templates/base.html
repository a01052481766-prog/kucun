<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}仓库库存管理系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">📦 仓库库存管理系统</div>
            <ul class="nav-menu">
                <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">概览</a></li>
                <li><a href="/materials" class="{% if request.path == '/materials' %}active{% endif %}">物料管理</a></li>
                <li><a href="/inventory" class="{% if request.path == '/inventory' %}active{% endif %}">库存操作</a></li>
                <li><a href="/report" class="{% if request.path == '/report' %}active{% endif %}">数据统计</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <p>&copy; 2024 仓库库存管理系统 | 为3-4人团队量身定制</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
