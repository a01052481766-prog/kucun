{% extends "base.html" %}

{% block title %}用户管理 - 仓库库存管理系统{% endblock %}

{% block content %}
<div class="content">
    <h1>用户管理</h1>

    <div class="form-section">
        <h2>添加用户</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>用户名 *</label>
                <input type="text" id="newUsername" placeholder="输入用户名">
            </div>
            <div class="form-group">
                <label>密码 *</label>
                <input type="password" id="newPassword" placeholder="输入密码">
            </div>
            <div class="form-group" style="justify-content: flex-end; padding-top: 1.8rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox" id="newIsAdmin" style="width: auto; padding: 0;">
                    设为管理员
                </label>
            </div>
        </div>
        <button onclick="createUser()" class="btn btn-primary">添加用户</button>
    </div>

    <div class="table-section">
        <h2>用户列表</h2>
        <table class="data-table" id="usersTable">
            <thead>
                <tr>
                    <th>用户名</th>
                    <th>角色</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="usersBody">
                <tr><td colspan="4" style="text-align:center;padding:20px">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal" id="pwdModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePwdModal()">&times;</span>
            <h2>修改密码</h2>
            <input type="hidden" id="pwdUserId">
            <div class="form-group" style="margin-top:1rem">
                <label>新密码</label>
                <input type="password" id="newPwd" placeholder="输入新密码">
            </div>
            <button onclick="savePassword()" class="btn btn-primary" style="margin-top:1rem">保存</button>
        </div>
    </div>
</div>

<script>
    const ME = {{ current_user.id }};

    async function loadUsers() {
        const res = await fetch('/api/users');
        const users = await res.json();
        const tbody = document.getElementById('usersBody');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.username}</td>
                <td><span class="badge ${u.is_admin ? 'success' : ''}">${u.is_admin ? '管理员' : '普通用户'}</span></td>
                <td>${u.created_at}</td>
                <td>
                    <button class="btn-small" onclick="openPwdModal(${u.id})">改密码</button>
                    ${u.id !== ME ? `<button class="btn-small danger" onclick="deleteUser(${u.id}, '${u.username}')">删除</button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    async function createUser() {
        const username = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('newPassword').value;
        const is_admin = document.getElementById('newIsAdmin').checked;
        if (!username || !password) { showNotification('用户名和密码不能为空', 'error'); return; }

        const res = await fetch('/api/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, is_admin })
        });
        const result = await res.json();
        showNotification(result.message, result.success ? 'success' : 'error');
        if (result.success) {
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('newIsAdmin').checked = false;
            loadUsers();
        }
    }

    async function deleteUser(id, username) {
        if (!confirm(`确定删除用户 "${username}"？`)) return;
        const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
        const result = await res.json();
        showNotification(result.message, result.success ? 'success' : 'error');
        if (result.success) loadUsers();
    }

    function openPwdModal(id) {
        document.getElementById('pwdUserId').value = id;
        document.getElementById('newPwd').value = '';
        document.getElementById('pwdModal').classList.add('show');
    }

    function closePwdModal() {
        document.getElementById('pwdModal').classList.remove('show');
    }

    async function savePassword() {
        const id = document.getElementById('pwdUserId').value;
        const password = document.getElementById('newPwd').value;
        if (!password) { showNotification('密码不能为空', 'error'); return; }
        const res = await fetch(`/api/users/${id}/password`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });
        const result = await res.json();
        showNotification(result.message, result.success ? 'success' : 'error');
        if (result.success) closePwdModal();
    }

    loadUsers();
</script>
{% endblock %}
